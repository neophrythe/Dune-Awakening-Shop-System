# Dune Awakening Shop — example configuration.
# Copy to config.yaml and fill in. config.yaml is git-ignored.
# Secrets may also be provided via environment variables (override this file):
#   DUNE_SHOP_DISCORD_TOKEN, DUNE_SHOP_DB_PASS, DUNE_SHOP_FLS_TOKEN

# HTTP admin/web panel (later milestone)
listen_addr: "0.0.0.0:8090"

# Postgres — the Dune game database (AMP host-networking exposes it on localhost)
database:
  host: "127.0.0.1"
  port: 15432
  user: "postgres"
  password: "postgres"   # prefer DUNE_SHOP_DB_PASS env var
  name: "dune"
  schema: "dune"

# Discord bot
discord:
  token: ""              # prefer DUNE_SHOP_DISCORD_TOKEN env var
  guild_id: ""           # your Discord server id (for fast slash-command registration)
  admin_role_id: ""      # role allowed to run admin commands

# Economy — how players earn/buy currency
economy:
  currency_name: "Solari"

  # Playtime rewards — credits online players each interval
  playtime:
    enabled: true
    per_minute: 1            # currency granted per accrual tick
    accrual_interval: "60s"
    # SQL returning one column of online players' game account ids.
    # Deployment-specific; leave empty to disable accrual until you set it.
    online_query: ""

  # Vote rewards — POST /webhook/vote  (header X-Webhook-Secret)
  votes:
    enabled: false
    reward: 100              # currency per confirmed vote
    secret: ""               # shared secret your vote provider must send

  # Real-money top-ups — POST /webhook/payment  (header X-Webhook-Secret)
  realmoney:
    enabled: false
    provider: "stripe"       # stripe | paypal
    public_key: ""
    secret_key: ""           # prefer DUNE_SHOP_PAYMENT_SECRET env var
    webhook_secret: ""       # shared secret for the payment webhook

# Game-database lookups (deployment-specific)
game:
  # Lets players link with ONLY their character name — the bot resolves the
  # account id from the game DB so non-technical users never need an id.
  # Must take the character name as $1 and return one text column (account id).
  # Leave empty to require players to supply an account id manually.
  # Example (adjust table/column names to your schema):
  #   character_lookup_query: "SELECT account_id FROM dune.characters WHERE name = $1 LIMIT 1"
  character_lookup_query: ""

# In-game delivery (ported from dune-admin's AMP/FLS path)
delivery:
  mode: "both"             # fls | rmq | both (both = FLS first, RMQ fallback)

  # FLS / PlayFab grant (account-level, works offline)
  fls_token: ""            # ServiceAuthToken; prefer DUNE_SHOP_FLS_TOKEN env var
  playfab_title_id: ""     # PlayFab title id

  # RMQ SpawnItem (live, player must be online) — runs inside the AMP container
  amp_container: "AMP_BuGIsland01"
  mq_root: "/AMP/duneawakening/extracted/mq"
  mq_home: "/AMP/duneawakening/runtime/mq-game-home"
  mq_node: "rabbit-game@localhost"
