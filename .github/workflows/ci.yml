name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go · fmt · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Verify formatting
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Build (plain)
        run: go build ./...
      - name: Test
        run: go test ./...

  dashboard:
    name: dashboard · spa + embed build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build SPA
        working-directory: web
        run: |
          npm install
          npm run build
      - name: Embed SPA + build binary
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist
          go build -tags embed -o dune-shop ./cmd/dune-shop
